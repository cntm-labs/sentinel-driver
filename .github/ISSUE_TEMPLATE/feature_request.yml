name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the driver does this relate to?
      options:
        - Connection (TCP/TLS, startup, handshake)
        - Pool (connection pool, health checks)
        - Protocol (wire protocol, messages)
        - Types (encode/decode, PG types)
        - Pipeline (query batching)
        - Copy (COPY IN/OUT)
        - Notify (LISTEN/NOTIFY)
        - Auth (SCRAM, MD5)
        - Other
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature?
      options:
        - High — blocks production use
        - Medium — important but has workaround
        - Low — nice to have
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature would you like to see?
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Describe the problem this would solve.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative approaches you've considered.
