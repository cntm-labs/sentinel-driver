name: Bug Report
description: Report a bug in sentinel-driver
labels: ["bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the driver is affected?
      options:
        - Connection (TCP/TLS, startup, handshake)
        - Pool (connection pool, health checks)
        - Protocol (wire protocol, messages)
        - Types (encode/decode, PG types)
        - Pipeline (query batching)
        - Copy (COPY IN/OUT)
        - Notify (LISTEN/NOTIFY)
        - Auth (SCRAM, MD5)
        - Other
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Severity
      description: How severe is this bug?
      options:
        - High — crash, data loss, or security issue
        - Medium — incorrect behavior with workaround
        - Low — minor or cosmetic issue
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the issue.
      placeholder: |
        1. Create connection with...
        2. Execute query...
        3. Observe error...
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
  - type: input
    id: rust-version
    attributes:
      label: Rust Version
      placeholder: "e.g., 1.78.0"
  - type: input
    id: pg-version
    attributes:
      label: PostgreSQL Version
      placeholder: "e.g., 16.2"
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g., Ubuntu 24.04, macOS 15"
